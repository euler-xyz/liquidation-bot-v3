[package]
name = "liquidation-bot-v3"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
reqwest = { version = "0.13", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
gql_client = "1.1.0"
alloy = { version = "1.8.2", features = ["full", "getrandom"] }
figment = { version = "0.10", features = ["toml", "env"] }
itertools = "0.14.0"
